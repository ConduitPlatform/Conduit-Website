on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "www/**"

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: yarn
      - run: cd www && yarn build
